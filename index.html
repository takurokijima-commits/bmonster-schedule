<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>b-monster 4スタジオ早見表</title>
<style>
body{margin:0;background:#f2f2f2;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;color:#111}
header{background:#fff;border-bottom:1px solid #ddd}
.top{height:72px;display:flex;align-items:center;justify-content:space-between;padding:0 14px}
.logo{font-weight:900;line-height:1;font-size:19px}.logo small{font-size:10px}
.title{font-weight:900;font-size:22px}.today{text-align:center;font-weight:900;font-size:28px;padding-bottom:8px}
.datebar{display:flex;gap:8px;overflow:auto;padding:10px 12px;background:#fff}
.datebtn{border:1px solid #ddd;background:#fff;border-radius:9px;padding:12px 22px;white-space:nowrap;font-size:18px}
.datebtn.active{background:#e95524;color:#fff;border-color:#e95524}
.status{padding:10px 12px;font-size:13px;color:#666;background:#fff;border-top:1px solid #eee}
.wrap{overflow:auto}
.studioHead{display:grid;grid-template-columns:64px repeat(4,165px);min-width:724px}
.corner{background:#eee}.studio{padding:14px 4px;text-align:center;color:#fff;font-weight:900;font-size:15px}
.ginza{background:#2b2b2b}.omote{background:#777}.shinjuku{background:#54b8ee}.ike{background:#e76682}
.table{display:grid;grid-template-columns:64px repeat(4,165px);min-width:724px}
.time{background:#fff;border-right:1px solid #ddd;border-bottom:1px solid #ddd;text-align:center;font-weight:900;font-size:20px;padding-top:45px}
.cell{border-right:1px solid #ddd;border-bottom:1px solid #ddd;padding:7px;background:#f7f7f7;min-height:132px}
.card{background:#fff;border:1px solid #ddd;border-radius:9px;min-height:118px;text-align:center;padding:9px 5px;box-shadow:0 1px 2px rgba(0,0,0,.05)}
.classTime{font-size:16px;margin-bottom:7px}.performer{font-weight:900;font-size:21px;letter-spacing:2px;margin-bottom:7px}
.program{font-size:16px;margin-bottom:8px}.difficulty{font-size:14px;border-top:1px solid #eee;padding-top:7px}
.badge{display:inline-block;font-size:12px;color:#fff;border-radius:3px;padding:2px 6px;margin-left:4px;background:#777}
.event{background:#e95524}.lite{background:#77aeca;color:#fff;padding:5px 9px;border-radius:2px}
.empty{opacity:.22;display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>
<header>
  <div class="top">
    <div class="logo">b-monster<br><small>FITNESS STUDIO</small></div>
    <div class="title">4スタジオ早見表</div>
    <div>☰</div>
  </div>
  <div class="today" id="today">読み込み中...</div>
  <div class="datebar" id="datebar"></div>
  <div class="status" id="status">公式スケジュール取得中...</div>
</header>

<div class="wrap">
  <div class="studioHead">
    <div class="corner"></div>
    <div class="studio ginza">GINZA</div>
    <div class="studio omote">OMOTESANDO</div>
    <div class="studio shinjuku">SHINJUKU</div>
    <div class="studio ike">IKEBUKURO</div>
  </div>
  <main class="table" id="table"></main>
</div>

<script>
const studios=[
  ["GINZA","https://b-monster.hacomono.jp/reserve/schedule/1/1/"],
  ["OMOTESANDO","https://b-monster.hacomono.jp/reserve/schedule/2/2"],
  ["SHINJUKU","https://b-monster.hacomono.jp/reserve/schedule/4/4"],
  ["IKEBUKURO","https://b-monster.hacomono.jp/reserve/schedule/5/5"]
];

let allLessons=[];
let dates=[];
let currentDate="";

function proxy(url){
  return "https://api.allorigins.win/raw?url="+encodeURIComponent(url);
}

function cleanLines(text){
  return text.split(/\n+/).map(s=>s.trim()).filter(Boolean);
}

function parseStudio(text, studio, url){
  const lines=cleanLines(text);
  const dateLines=lines.filter(x=>/^\d{1,2}\/\d{1,2} \(.+\)$/.test(x)).slice(0,7);

  if(!dates.length){
    dates=dateLines;
    currentDate=dates[0];
  }

  const startIndex=lines.findIndex(x=>/^\d{1,2}:\d{2} - \d{1,2}:\d{2}$/.test(x));
  const lessonLines=lines.slice(startIndex);

  const lessons=[];
  let i=0;
  let lastStart="";
  let datePointer=0;

  while(i<lessonLines.length){
    const line=lessonLines[i];

    if(/^\d{1,2}:\d{2} - \d{1,2}:\d{2}$/.test(line)){
      const time=line;
      const [start,end]=time.split(" - ");

      if(start!==lastStart){
        lastStart=start;
        datePointer=0;
      }

      const performer=lessonLines[i+1]||"";
      let program=lessonLines[i+2]||"";
      let difficulty="";
      let status="";

      let jump=3;

      if(program==="Ad live"){
        program=(lessonLines[i+3]||"RANDOM");
        status="RANDOM";
        jump=4;
      }

      if(program==="Lite Program"){
        status="LITE";
      }

      if(lessonLines[i+jump] && lessonLines[i+jump].startsWith("EVENT")){
        status="EVENT";
        jump++;
      }

      if(lessonLines[i+jump] && lessonLines[i+jump].startsWith("難易度")){
        difficulty=lessonLines[i+jump].replace("難易度","");
        jump++;
      }

      const date=dateLines[datePointer] || dateLines[0];

      if(performer && program && !performer.includes("Image")){
        lessons.push({date,start,end,studio,performer,program,difficulty,status,url});
      }

      datePointer++;
      i+=jump;
    }else{
      i++;
    }
  }

  return lessons;
}

function renderDates(){
  const bar=document.getElementById("datebar");
  bar.innerHTML="";
  dates.forEach(d=>{
    const b=document.createElement("button");
    b.className="datebtn"+(d===currentDate?" active":"");
    b.innerHTML=d.replace(" ","<br>");
    b.onclick=()=>{currentDate=d;renderDates();render();window.scrollTo(0,0)};
    bar.appendChild(b);
  });
  document.getElementById("today").textContent=currentDate;
}

function render(){
  const data=allLessons.filter(l=>l.date===currentDate);
  const times=[...new Set(data.map(l=>l.start))].sort();
  const table=document.getElementById("table");
  table.innerHTML="";

  times.forEach(t=>{
    const tc=document.createElement("div");
    tc.className="time";
    tc.textContent=t;
    table.appendChild(tc);

    studios.forEach(([studio])=>{
      const cell=document.createElement("div");
      cell.className="cell";
      const l=data.find(x=>x.start===t && x.studio===studio);

      if(!l){
        cell.innerHTML='<div class="card empty">—</div>';
      }else{
        const card=document.createElement("div");
        card.className="card";

        const badge=l.status==="EVENT" ? '<span class="badge event">EVENT</span>' :
                    l.status==="RANDOM" ? '<span class="badge">RANDOM</span>' : "";

        const program=l.status==="LITE"
          ? '<span class="lite">Lite Program</span>'
          : l.program+badge;

        card.innerHTML=`
          <div class="classTime">${l.start} - ${l.end}</div>
          <div class="performer">${l.performer}</div>
          <div class="program">${program}</div>
          <div class="difficulty">難易度 ${l.difficulty||""}</div>
        `;

        card.onclick=()=>{
          if(confirm(`${l.studio} ${l.start}-${l.end}\n${l.performer} / ${l.program}\n公式予約ページを開きますか？`)){
            window.open(l.url,"_blank");
          }
        };

        cell.appendChild(card);
      }
      table.appendChild(cell);
    });
  });
}

async function load(){
  try{
    const results=await Promise.all(studios.map(async ([name,url])=>{
      const html=await fetch(proxy(url)).then(r=>r.text());
      const doc=new DOMParser().parseFromString(html,"text/html");
      return parseStudio(doc.body.innerText,name,url);
    }));

    allLessons=results.flat();
    renderDates();
    render();
    document.getElementById("status").textContent="公式スケジュール取得完了";
  }catch(e){
    console.error(e);
    document.getElementById("status").textContent="取得に失敗しました。更新するか、CORS制限の可能性があります。";
  }
}

load();
</script>
</body>
</html>
