<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>bmonster-schedule</title>
<style>
  :root{--orange:#e95522;--line:#e7e7e7;--text:#222;--muted:#666;--card:#fff;--bg:#f4f4f4;}
  *{box-sizing:border-box} body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;color:var(--text)}
  header{position:sticky;top:0;z-index:5;background:#fff;border-bottom:1px solid #ddd;padding:14px 12px 10px;}
  .top{display:flex;align-items:center;justify-content:space-between;gap:10px}.logo{font-weight:800;line-height:.95;letter-spacing:.02em}.logo small{display:block;font-size:10px;font-weight:600}.title{font-weight:800;font-size:20px}.icons{display:flex;gap:14px;font-size:24px}.datebar{display:flex;align-items:center;justify-content:center;gap:20px;margin:16px 0 10px;font-size:22px;font-weight:700}.arrow{font-size:28px}.tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px}.tab{min-width:88px;padding:10px 12px;background:#fff;border:1px solid #ddd;border-radius:7px;text-align:center}.tab.active{background:var(--orange);color:white;border-color:var(--orange)}
  .studio-head{position:sticky;top:106px;z-index:4;display:grid;grid-template-columns:62px repeat(4, minmax(145px,1fr));min-width:720px}.blank{background:#fff;border-right:1px solid var(--line)}.studio{padding:14px 8px;text-align:center;color:#fff;font-weight:800;letter-spacing:.08em}.studio small{display:block;margin-top:6px;font-size:12px;letter-spacing:0}.ginza{background:#333}.omote{background:#777}.shinjuku{background:#62b8ee}.ike{background:#e85f80}.star{color:#ffe130;margin-right:5px}
  .wrap{overflow:auto}.grid{display:grid;grid-template-columns:62px repeat(4,minmax(145px,1fr));min-width:720px}.time{background:#fff;border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:22px 6px;text-align:center;font-size:20px;font-weight:700}.cell{padding:6px;border-bottom:1px solid var(--line);background:#fafafa}.lesson{background:#fff;border:1px solid #ddd;border-radius:8px;text-align:center;min-height:104px;padding:9px 6px;box-shadow:0 1px 2px rgba(0,0,0,.03);cursor:pointer}.lesson .range{font-size:15px}.lesson .name{font-size:18px;font-weight:800;letter-spacing:.08em;margin:6px 0}.lesson .program{font-size:14px}.lesson .level{font-size:12px;margin-top:8px;border-top:1px solid #eee;padding-top:6px}.badge{display:inline-block;background:#7fa9bf;color:#fff;border-radius:2px;padding:2px 6px;font-size:12px;margin-left:4px}.full{background:#6d6d6d}.event{background:#999}.search{display:flex;gap:8px;padding:10px 12px;background:#fff;border-bottom:1px solid #ddd}.search input{flex:1;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:16px}.search button{border:0;background:#222;color:#fff;border-radius:8px;padding:0 12px;font-weight:700}.hint{padding:10px 12px;font-size:12px;color:#666;background:#fff;border-bottom:1px solid #ddd}
</style>
</head>
<body>
<header>
  <div class="top"><div class="logo">b-monster<small>BOXING FITNESS STUDIO</small></div><div class="title">4スタジオ早見表</div><div class="icons">⌕ ☆ ≡</div></div>
  <div class="datebar"><span class="arrow">‹</span><span>2026/7/1（水）</span><span class="arrow">›</span></div>
  <div class="tabs"><div class="tab">6/30（火）</div><div class="tab active">7/1（水）</div><div class="tab">7/2（木）</div><div class="tab">7/3（金）</div><div class="tab">7/4（土）</div><div class="tab">7/5（日）</div><div class="tab">7/6（月）</div></div>
</header>
<div class="search"><input id="q" placeholder="パフォーマー・プログラム検索 例：SALLY / MIX"><button onclick="filterLessons()">検索</button></div>
<div class="hint">v1デモ：カードをタップすると公式予約ページを開きます。次に実データ取得版へ進めます。</div>
<div class="wrap">
  <div class="studio-head"><div class="blank"></div><div class="studio ginza"><span class="star">★</span>GINZA<small>営業時間 6:30〜22:45</small></div><div class="studio omote"><span class="star">★</span>OMOTESANDO<small>営業時間 6:30〜22:45</small></div><div class="studio shinjuku"><span class="star">★</span>SHINJUKU<small>営業時間 6:30〜22:45</small></div><div class="studio ike"><span class="star">★</span>IKEBUKURO<small>営業時間 6:30〜22:45</small></div></div>
  <main class="grid" id="grid"></main>
</div>
<script>
const studios=[['銀座','https://b-monster.hacomono.jp/reserve/schedule/1/1/'],['表参道','https://b-monster.hacomono.jp/reserve/schedule/2/2'],['新宿','https://b-monster.hacomono.jp/reserve/schedule/4/4'],['池袋','https://b-monster.hacomono.jp/reserve/schedule/5/5']];
const rows=[
 ['6:30',[['6:30 - 7:25','ACE','EDM1','★★☆☆☆',''],['6:30 - 7:25','RYU','K-POP1','★★☆☆☆',''],['6:30 - 7:25','Chad','MIX1','★☆☆☆☆',''],['6:30 - 7:25','ZERO','EDM1','★★☆☆☆','']]],
 ['6:50',[['6:50 - 7:45','ASAMI','MIX1','★★★☆☆','FULL'],['6:50 - 7:45','ACE','EDM0','★☆☆☆☆',''],['6:50 - 7:45','JELLENA','K-POP3','★★☆☆☆',''],['6:50 - 7:45','Kirara','MIX2','★☆☆☆☆','']]],
 ['8:10',[['8:10 - 9:05','SALLY','POPS0','★☆☆☆☆',''],['8:10 - 9:05','SALLY','POPS0','★☆☆☆☆',''],['8:10 - 9:05','JELLENA','K-POP3','★★☆☆☆',''],['8:10 - 9:05','JOANA','LATIN2','★★★☆☆','']]],
 ['9:30',[['9:30 - 10:25','RR!','Gryffin','★★☆☆☆',''],['9:30 - 10:25','RIO','MIX3','★★☆☆☆',''],['9:30 - 10:25','SALLY','MIX1','★★☆☆☆',''],['9:30 - 10:25','RIO','ASIA','★★☆☆☆','EVENT']]],
 ['10:50',[['10:50 - 11:45','Chad','ROCK1','★★☆☆☆',''],['10:50 - 11:45','ASAMI','EDM1','★★★☆☆',''],['10:50 - 11:45','ACE','MIX1','★★☆☆☆',''],['10:50 - 11:45','JELLENA','K-POP1','★★☆☆☆','']]],
 ['12:10',[['12:10 - 13:05','ULU','HIPHOP0','★☆☆☆☆',''],['12:10 - 13:05','SALLY','Lite Program','🔰','Lite Program'],['12:10 - 13:05','JELLENA','K-POP1','★☆☆☆☆',''],['12:10 - 13:05','KAORI','MIX1','★☆☆☆☆','']]],
 ['13:30',[['13:30 - 14:25','SALLY','POPS0','★☆☆☆☆',''],['13:30 - 14:25','RIO','MIX3','★★☆☆☆',''],['13:30 - 14:25','RR!','Gryffin','★★☆☆☆',''],['13:30 - 14:25','ULU','EDM1','★★☆☆☆','']]],
 ['14:50',[['14:50 - 15:45','ULU','OCEANIA','★☆☆☆☆','EVENT'],['14:50 - 15:45','ACE','MIX2','★★★☆☆',''],['14:50 - 15:45','YUUHI','MIX2','★★★☆☆',''],['14:50 - 15:45','RR!','COUNTRY1','★★★☆☆','']]],
 ['16:10',[['16:10 - 17:05','RR!','Mobility1','★★☆☆☆',''],['16:10 - 17:05','ASAMI','MIX1','★★☆☆☆',''],['16:10 - 17:05','Kirara','MIX4','★★☆☆☆',''],['16:10 - 17:05','SALLY','EUROPE','★★★☆☆','EVENT']]],
 ['17:30',[['17:30 - 18:25','ASAMI','EDM1','★★☆☆☆',''],['17:30 - 18:25','LEON','MIX1','★★☆☆☆',''],['17:30 - 18:25','JELLENA','EDM0','★☆☆☆☆',''],['17:30 - 18:25','Kirara','MIX2','★★☆☆☆','']]]
];
function badge(b){ if(!b)return ''; let cls=b==='FULL'?'full':b==='EVENT'?'event':''; return `<span class="badge ${cls}">${b}</span>`; }
function card(l,studioIndex){return `<div class="lesson" onclick="openReserve(${studioIndex})" data-text="${(l[1]+' '+l[2]+' '+l[4]).toLowerCase()}"><div class="range">${l[0]}</div><div class="name">${l[1]}</div><div class="program">${l[2]} ${badge(l[4])}</div><div class="level">難易度 ${l[3]}</div></div>`}
function render(){const g=document.getElementById('grid'); g.innerHTML=''; rows.forEach(r=>{g.insertAdjacentHTML('beforeend',`<div class="time">${r[0]}</div>`); r[1].forEach((l,i)=>g.insertAdjacentHTML('beforeend',`<div class="cell">${card(l,i)}</div>`));});}
function openReserve(i){ if(confirm('公式予約ページを開きますか？')) location.href=studios[i][1]; }
function filterLessons(){const q=document.getElementById('q').value.trim().toLowerCase(); document.querySelectorAll('.lesson').forEach(el=>{el.style.opacity=!q||el.dataset.text.includes(q)?'1':'.18';});}
render();
</script>
</body>
</html>
